services:
  mcp-bildsprache:
    build: .
    restart: unless-stopped
    ports:
      - "8007:8000"  # 8007 = next sequential MCP port on nebula-1
    labels:
      docktail.service.enable: "true"
      docktail.service.name: "bildsprache-gallery"
      docktail.service.port: "8000"
      docktail.service.network: "git-mcp-bildsprache-nebula_default"
    environment:
      - TRANSPORT=http
      - HOST=0.0.0.0
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - BFL_API_KEY=${BFL_API_KEY:-}
      - RECRAFT_API_KEY=${RECRAFT_API_KEY:-}
      - RECRAFT_TIER=${RECRAFT_TIER:-free}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_IMAGE_MODEL=${OPENAI_IMAGE_MODEL:-gpt-image-2}
      - OPENAI_IMAGE_MODEL_DRAFT=${OPENAI_IMAGE_MODEL_DRAFT:-gpt-image-1-mini}
      - MCP_BILDSPRACHE_API_KEY=${MCP_BILDSPRACHE_API_KEY:-}
      - MCP_BILDSPRACHE_PUBLIC_URL=${MCP_BILDSPRACHE_PUBLIC_URL:-https://bildsprache.cdit-dev.de}
      - KEYCLOAK_ISSUER=${KEYCLOAK_ISSUER:-https://auth.cdit-works.de/realms/cdit-mcp}
      - KEYCLOAK_AUDIENCE=${KEYCLOAK_AUDIENCE:-mcp-bildsprache}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-mcp-bildsprache}
      - KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
      - ENABLE_HOSTING=${ENABLE_HOSTING:-false}
      - IMAGE_DOMAIN=${IMAGE_DOMAIN:-https://img.cdit-works.de}
      - FASTMCP_HOME=/data/fastmcp
      - GALLERY_ENABLED=${GALLERY_ENABLED:-true}
      - GALLERY_TAILNET_HOSTNAME=${GALLERY_TAILNET_HOSTNAME:-}
      - GALLERY_REINDEX_INTERVAL_SECONDS=${GALLERY_REINDEX_INTERVAL_SECONDS:-300}
      - GALLERY_SOFT_ZIP_CAP_MB=${GALLERY_SOFT_ZIP_CAP_MB:-250}
      - IDENTITY_ENABLED=${IDENTITY_ENABLED:-true}
      - IDENTITY_DIR=${IDENTITY_DIR:-/data/identity}
    volumes:
      - fastmcp-data:/data/fastmcp
      - images-data:/data/images
      - identity-data:/data/identity:ro

volumes:
  fastmcp-data:
  images-data:
  identity-data:
